name: 🎯 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Download Mode'
        required: true
        type: choice
        options:
          - single
          - playlist
          - channel
          - search
          - trim
        default: 'single'
      url:
        description: '🎬 URL or Search Query or channel name (@ChannelName or ChannelName)'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: 'Quality (video: 144/360/480/720/1080 | audio: 128/192/320)'
        required: false
        type: string
        default: '720'
      trim_start:
        description: '✂️ Trim Start Time (only for trim mode - e.g., 00:01:30 or 90)'
        required: false
        type: string
        default: ''
      trim_end:
        description: '✂️ Trim End Time (only for trim mode - e.g., 00:03:45 or 225)'
        required: false
        type: string
        default: ''
      max_videos:
        description: '🔢 Max results'
        required: false
        type: number
        default: 10
      split_threshold_mb:
        description: '📦 Split > MB (0=no)'
        required: false
        type: number
        default: 50

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  download-and-process:
    name: 🚀 YouTube Downloader
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp
          command -v zip &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq zip)
          command -v ffmpeg &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg)

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          if [[ "$M" == "channel" && "$U" != http* ]]; then
            U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          fi
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT

      - name: 🎯 Download & Process
        id: main
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          TYPE: ${{ github.event.inputs.type }}
          QUALITY: ${{ github.event.inputs.quality }}
          TRIM_START: ${{ github.event.inputs.trim_start }}
          TRIM_END: ${{ github.event.inputs.trim_end }}
          MAX: ${{ github.event.inputs.max_videos }}
          SPLIT: ${{ github.event.inputs.split_threshold_mb }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, re, subprocess, sys, hashlib
          import requests as rq
          from pathlib import Path
          from datetime import datetime
          import urllib.parse

          M = os.environ['MODE']
          U = os.environ['URL']
          T = os.environ['TYPE']
          Q = os.environ.get('QUALITY', '720')
          MX = int(os.environ.get('MAX', '10'))
          SP = int(os.environ.get('SPLIT', '50'))
          TRIM_START = os.environ.get('TRIM_START', '').strip()
          TRIM_END = os.environ.get('TRIM_END', '').strip()

          API = 'https://hub.ytconvert.org/api/download'
          H = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Accept': 'application/json',
              'Referer': 'https://media.ytmp3.gg/',
              'Content-Type': 'application/json',
              'Origin': 'https://media.ytmp3.gg'
          }

          def sanitize_filename(filename):
              """Remove invalid characters for filename"""
              # Remove or replace invalid characters
              filename = re.sub(r'[<>:"/\\|?*]', '_', filename)
              # Remove control characters
              filename = ''.join(char for char in filename if ord(char) >= 32)
              # Remove extra spaces and trim
              filename = re.sub(r'\s+', ' ', filename).strip()
              # Limit length
              if len(filename) > 200:
                  filename = filename[:200]
              return filename.strip()

          def extract_video_id(url):
              """Extract YouTube video ID from URL"""
              patterns = [
                  r'(?:v=|\/)([0-9A-Za-z_-]{11})(?:[?&]|$)',
                  r'(?:embed\/)([0-9A-Za-z_-]{11})',
                  r'(?:youtu\.be\/)([0-9A-Za-z_-]{11})'
              ]
              for pattern in patterns:
                  match = re.search(pattern, url)
                  if match:
                      return match.group(1)
              return None

          def get_youtube_title(url):
              """Get YouTube video title using multiple methods"""
              video_id = extract_video_id(url)
              if not video_id:
                  return None
              
              # Method 1: Try yt-dlp with direct output
              try:
                  print(f'   Fetching title for video ID: {video_id}')
                  cmd = ['yt-dlp', '--get-title', '--no-warnings', '--no-check-certificate', url]
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=20)
                  if result.returncode == 0 and result.stdout.strip():
                      title = result.stdout.strip()
                      print(f'   ✓ Got title via yt-dlp: {title[:50]}...')
                      return title
              except Exception as e:
                  print(f'   ⚠️ yt-dlp title fetch failed: {e}')
              
              # Method 2: Try using oEmbed API (no API key needed)
              try:
                  oembed_url = f'https://www.youtube.com/oembed?url={urllib.parse.quote(url)}&format=json'
                  response = rq.get(oembed_url, timeout=10)
                  if response.status_code == 200:
                      data = response.json()
                      title = data.get('title')
                      if title:
                          print(f'   ✓ Got title via oEmbed: {title[:50]}...')
                          return title
              except Exception as e:
                  print(f'   ⚠️ oEmbed fetch failed: {e}')
              
              # Method 3: Try YouTube's info API (no API key needed for basic info)
              try:
                  info_url = f'https://www.youtube.com/watch?v={video_id}'
                  response = rq.get(info_url, timeout=10, headers={'User-Agent': 'Mozilla/5.0'})
                  if response.status_code == 200:
                      # Try to extract title from HTML
                      title_match = re.search(r'<title>(.*?)</title>', response.text)
                      if title_match:
                          title = title_match.group(1).replace(' - YouTube', '')
                          print(f'   ✓ Got title from HTML: {title[:50]}...')
                          return title
              except Exception as e:
                  print(f'   ⚠️ HTML parsing failed: {e}')
              
              print(f'   ❌ All title fetching methods failed')
              return None

          def time_to_seconds(time_str):
              """Convert time string (HH:MM:SS, MM:SS, or seconds) to seconds"""
              if not time_str:
                  return None
              
              time_str = time_str.strip()
              
              # Try direct integer (seconds)
              try:
                  return int(time_str)
              except ValueError:
                  pass
              
              # Try HH:MM:SS or MM:SS format
              parts = time_str.split(':')
              if len(parts) == 3:  # HH:MM:SS
                  return int(parts[0]) * 3600 + int(parts[1]) * 60 + int(parts[2])
              elif len(parts) == 2:  # MM:SS
                  return int(parts[0]) * 60 + int(parts[1])
              else:
                  raise ValueError(f"Invalid time format: {time_str}")

          def trim_video(input_path, output_path, start_time, end_time):
              """Trim video using ffmpeg"""
              if not start_time and not end_time:
                  return True
              
              cmd = ['ffmpeg', '-i', str(input_path)]
              
              if start_time:
                  cmd.extend(['-ss', str(start_time)])
              if end_time:
                  duration = end_time - (start_time or 0)
                  cmd.extend(['-t', str(duration)])
              
              # Re-encode for accurate cuts
              if T == 'audio':
                  cmd.extend(['-c:a', 'mp3', '-b:a', f'{Q}k'])
              else:
                  cmd.extend(['-c:v', 'libx264', '-c:a', 'aac', '-preset', 'fast'])
              
              cmd.extend(['-y', str(output_path)])
              
              try:
                  print(f'   ✂️ Trimming video/audio...')
                  if start_time:
                      print(f'      Start: {start_time}s')
                  if end_time:
                      print(f'      End: {end_time}s')
                      print(f'      Duration: {end_time - (start_time or 0)}s')
                  
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=300)
                  if result.returncode == 0:
                      print(f'   ✅ Trimmed successfully')
                      return True
                  else:
                      print(f'   ⚠️ FFmpeg error: {result.stderr[:200]}')
                      return False
              except Exception as e:
                  print(f'   ❌ Trimming failed: {e}')
                  return False

          def safe_name(text, maxlen=40):
              safe = re.sub(r'[^\w]', '_', text)[:maxlen]
              safe = re.sub(r'_+', '_', safe).strip('_')
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def fm(n):
              if not n: return 'N/A'
              try:
                  n = int(n)
                  return f'{n/1e6:.1f}M' if n >= 1e6 else f'{n/1e3:.1f}K' if n >= 1e3 else str(n)
              except: return str(n)

          def get_channel_from_url(url):
              """Extract channel identifier from any YouTube URL"""
              # Try @handle
              m = re.search(r'@([\w-]+)', url)
              if m: return m.group(1)
              # Try channel/ID
              m = re.search(r'channel/([\w-]+)', url)
              if m: return m.group(1)
              # Try c/name
              m = re.search(r'c/([\w-]+)', url)
              if m: return m.group(1)
              # Try /user/name
              m = re.search(r'user/([\w-]+)', url)
              if m: return m.group(1)
              return None

          def get_channel_from_playlist(playlist_url):
              """Get the actual channel name from a playlist by looking at its first video"""
              try:
                  # Get first video from playlist
                  cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--playlist-end', '1',
                         '--no-warnings', '--no-check-certificate', playlist_url]
                  r = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  if r.returncode == 0 and r.stdout.strip():
                      d = json.loads(r.stdout.strip().split('\n')[0])
                      vid = d.get('id', '')
                      if vid:
                          # Just get channel from the video URL
                          ch = d.get('channel') or d.get('uploader') or d.get('uploader_id')
                          if ch: return safe_name(ch, 30)
              except: pass
              return None

          def gvl(u, n):
              """Get video list - returns (videos, channel_folder_name)"""
              # Step 1: Try to get channel from URL pattern
              channel_folder = get_channel_from_url(u)
              
              # Step 2: If playlist and no channel found, get from first video
              if not channel_folder and 'playlist' in u:
                  print(f'   🔍 Detecting channel from playlist...')
                  channel_folder = get_channel_from_playlist(u)
              
              # Step 3: Last resort
              if not channel_folder:
                  channel_folder = 'playlist_videos'
              
              print(f'   📁 Folder: {channel_folder}_videos')
              
              c = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']
              if n > 0: c.extend(['--playlist-end', str(n)])
              c.append(u)
              r = subprocess.run(c, capture_output=True, text=True, timeout=30)
              v = []
              for line in r.stdout.strip().split('\n'):
                  if line and len(v) < n:
                      try:
                          d = json.loads(line)
                          vid = d.get('id', '')
                          if not vid: continue
                          
                          print(f'   📊 [{len(v)+1}/{n}] Getting info for video {vid}...')
                          
                          title = d.get('title', 'Untitled')
                          ch = d.get('channel') or d.get('uploader') or d.get('uploader_id') or 'Unknown'
                          vw = d.get('view_count')
                          dr = d.get('duration', 0)
                          
                          v.append({
                              'id': vid, 
                              'full_title': title,
                              'u': f'https://youtube.com/watch?v={vid}',
                              'dr': int(dr) if dr else 0,
                              'th': f'https://i.ytimg.com/vi/{vid}/maxresdefault.jpg',
                              'c': str(ch).strip() if ch else 'Unknown',
                              'v': fm(vw)
                          })
                      except Exception as e:
                          print(f'      ⚠️ Skip: {str(e)[:40]}')
                          continue
              
              return v, channel_folder

          def mkidx(v, cn, cd):
              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              Path('./playlists').mkdir(exist_ok=True)
              inf = cd / 'info'
              inf.mkdir(parents=True, exist_ok=True)
              idxf = f'playlists/{cn}_{ts}.md'
              
              m = (f'# 📺 {cn}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(v)} videos**\n\n'
                   f'| # | Thumbnail | Title | Duration | Views |\n'
                   f'|---|-----------|-------|----------|-------|\n')
              for i, x in enumerate(v, 1):
                  dur_str = f'{x["dr"]//60}:{x["dr"]%60:02d}' if x['dr'] else '?'
                  short_title = x['full_title'][:50] + '...' if len(x['full_title']) > 50 else x['full_title']
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | {short_title} | {dur_str} | {x["v"]} |\n'
              
              m += '\n---\n\n## 📝 Details\n\n'
              for i, x in enumerate(v, 1):
                  sn = f'v{i:03d}_{x["id"]}'
                  dur_str = f'{x["dr"]//60} minutes' if x['dr'] else 'Unknown'
                  info_md = (f'# 🎬 {x["full_title"]}\n\n'
                            f'![Thumbnail]({x["th"]})\n\n'
                            f'## Info\n\n'
                            f'| Property | Value |\n|----------|-------|\n'
                            f'| **Channel** | {x["c"]} |\n'
                            f'| **Duration** | {dur_str} |\n'
                            f'| **Views** | {x["v"]} |\n'
                            f'| **Video ID** | `{x["id"]}` |\n'
                            f'| **URL** | {x["u"]} |\n\n'
                            f'## Thumbnail\n\n'
                            f'<img src="{x["th"]}" width="640">\n\n'
                            f'---\n*Downloaded: {datetime.now():%Y-%m-%d %H:%M}*')
                  (inf / f'{sn}.md').write_text(info_md)
                  m += (f'### {i}. {x["full_title"]}\n\n'
                       f'![Thumbnail]({x["th"]})\n\n'
                       f'- **{dur_str}** | **{x["v"]}** views | **{x["c"]}**\n'
                       f'- 📄 [info/{sn}.md](info/{sn}.md)\n\n---\n\n')
              
              Path(idxf).write_text(m)
              print(f'📄 Index: {idxf}')
              return idxf

          def dl_video(u):
              e = 'mp3' if T == 'audio' else 'mp4'
              p = {'url': u, 'os': 'linux', 'output': {'type': 'audio' if T == 'audio' else 'video', 'format': e}}
              if T == 'audio': p['audio'] = {'bitrate': f'{Q}k'}
              else: p['output']['quality'] = f'{Q}p'

              for retry in range(3):
                  if retry > 0:
                      print(f'   🔄 Retry {retry}/3...')
                      time.sleep(5)
                  try:
                      rr = rq.post(API, json=p, headers=H, timeout=15)
                      if rr.status_code != 200: continue
                      d = rr.json()
                      su = d.get('statusUrl')
                      if not su: continue
                      print(f'   ⏳ Converting...')
                      for _ in range(60):
                          time.sleep(2)
                          try:
                              sr = rq.get(su, headers=H, timeout=10)
                              if sr.status_code == 200:
                                  sd = sr.json()
                                  st = sd.get('status', '')
                                  if st == 'completed':
                                      du = sd.get('downloadUrl')
                                      if du: return {'u': du, 'e': e}
                                  elif st in ('failed', 'error'): break
                          except: continue
                  except: time.sleep(2)
              return None

          def download_file(url, filepath):
              try:
                  dr = rq.get(url, headers=H, stream=True, timeout=600)
                  if dr.status_code == 200:
                      total = int(dr.headers.get('content-length', 0))
                      done = 0
                      with open(filepath, 'wb') as f:
                          for chunk in dr.iter_content(65536):
                              f.write(chunk)
                              done += len(chunk)
                              if total > 0 and done % (10*65536) == 0:
                                  print(f'\r   ⬇️ {done*100/total:.1f}%', end='')
                      print(f'\r   ⬇️ 100.0%')
                      return filepath.stat().st_size
              except Exception as e:
                  print(f'   ❌ Download error: {e}')
              return 0

          def split_file(filepath, threshold_mb):
              size_mb = filepath.stat().st_size / 1e6
              if threshold_mb > 0 and size_mb > threshold_mb:
                  print(f'   ✂️ Splitting ({size_mb:.0f}MB) into {threshold_mb}MB parts...')
                  parent = filepath.parent
                  name = filepath.name
                  subprocess.run(['zip', '-r', '-q', '-s', f'{threshold_mb}m', f'{name}.zip', name], cwd=parent, check=True)
                  filepath.unlink()
                  parts = sorted(parent.glob(f'{name}.z*'))
                  print(f'   ✅ Split into {len(parts)} parts')
                  return True
              return False

          # Parse trim times if in trim mode
          if M == 'trim':
              try:
                  start_sec = time_to_seconds(TRIM_START) if TRIM_START else None
                  end_sec = time_to_seconds(TRIM_END) if TRIM_END else None
                  
                  if not TRIM_START and not TRIM_END:
                      print('❌ Trim mode requires at least start or end time')
                      sys.exit(1)
                  
                  if start_sec is not None and start_sec < 0:
                      print('❌ Start time cannot be negative')
                      sys.exit(1)
                  if end_sec is not None and end_sec < 0:
                      print('❌ End time cannot be negative')
                      sys.exit(1)
                  if start_sec is not None and end_sec is not None and start_sec >= end_sec:
                      print('❌ Start time must be less than end time')
                      sys.exit(1)
                  
                  print(f'✂️ TRIM MODE ENABLED')
                  print(f'   Start: {TRIM_START or "0"} → {start_sec or 0}s')
                  print(f'   End: {TRIM_END or "end"} → {end_sec or "end"}s')
              except ValueError as e:
                  print(f'❌ Invalid time format: {e}')
                  sys.exit(1)

          print(f'{"="*50}')
          print(f'🎬 {M.upper()} MODE')
          print(f'{"="*50}')

          if M == 'search':
              v, _ = gvl(f'ytsearch{MX}:{U}', MX)
              if not v: print('❌ No results'); sys.exit(1)
              ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
              Path('./searches').mkdir(exist_ok=True)
              qs = safe_name(U, 30)
              f = f'searches/{qs}_{ts}.md'
              m = (f'# 🔍 Search: {U}\n\n**{datetime.now():%Y-%m-%d %H:%M}** | **{len(v)} results**\n\n'
                   f'| # | Thumbnail | Title | Channel | Views | Duration |\n'
                   f'|---|-----------|-------|---------|-------|----------|\n')
              for i, x in enumerate(v, 1):
                  short_title = x['full_title'][:50] + '...' if len(x['full_title']) > 50 else x['full_title']
                  m += f'| {i} | [<img src="{x["th"]}" width="80">]({x["u"]}) | {short_title} | {x["c"][:20]} | {x["v"]} | {x["dr"]//60}m |\n'
              m += '\n---\n\n'
              for i, x in enumerate(v, 1):
                  m += (f'### {i}. {x["full_title"]}\n\n<img src="{x["th"]}" width="640">\n\n'
                       f'| Property | Value |\n|----------|-------|\n'
                       f'| Channel | {x["c"]} |\n| Duration | {x["dr"]//60}m |\n'
                       f'| Views | {x["v"]} |\n| ID | `{x["id"]}` |\n| URL | {x["u"]} |\n\n---\n\n')
              Path(f).write_text(m)
              Path('/tmp/meta.json').write_text(json.dumps({'m': 'search', 'ok': 0}))
              print(f'✅ {f}')

          elif M == 'trim':
              # Trim mode - download a single video and trim it
              print(f'\n✂️ Processing trim request...')
              print(f'   URL: {U}')
              
              # Get video title using multiple methods
              video_title = get_youtube_title(U)
              
              if not video_title:
                  print('   ⚠️ Could not fetch video title, using video ID as fallback')
                  video_id = extract_video_id(U)
                  video_title = f"video_{video_id}" if video_id else "youtube_video"
              
              print(f'   📹 Video Title: {video_title}')
              
              # Get channel info (optional)
              channel_name = get_channel_from_url(U)
              if not channel_name:
                  channel_name = "youtube_downloads"
              
              # Download the video
              result = dl_video(U)
              if result:
                  cd = Path(f'downloads/{channel_name}_videos')
                  cd.mkdir(parents=True, exist_ok=True)
                  
                  # Create sanitized filename from YouTube title
                  base_filename = sanitize_filename(video_title)
                  
                  # Create trimmed filename with proper formatting
                  trim_suffix = ""
                  if TRIM_START:
                      # Convert time format for filename (replace colons with hyphens)
                      start_clean = TRIM_START.replace(':', '-')
                      trim_suffix += f"_from_{start_clean}"
                  if TRIM_END:
                      end_clean = TRIM_END.replace(':', '-')
                      trim_suffix += f"_to_{end_clean}"
                  
                  # Final filename: "Video Title_from_01-30_to_03-45_trimmed.mp4"
                  final_filename = f"{base_filename}{trim_suffix}_trimmed.{result['e']}"
                  temp_fp = cd / f"{base_filename}_temp.{result['e']}"
                  final_fp = cd / final_filename
                  
                  print(f'   💾 Will save as: {final_filename}')
                  
                  size = download_file(result['u'], temp_fp)
                  if size:
                      print(f'   ✅ Downloaded ({size/1e6:.1f}MB)')
                      
                      # Apply trimming
                      if trim_video(temp_fp, final_fp, start_sec, end_sec):
                          temp_fp.unlink()  # Remove original
                          print(f'   ✅ Trimmed video saved: {final_filename}')
                          print(f'   📁 Location: {cd}/')
                          
                          # Apply splitting if needed
                          split_file(final_fp, SP)
                      else:
                          print('   ❌ Trimming failed')
                          sys.exit(1)
                  else:
                      print('   ❌ Download failed')
                      sys.exit(1)
              else:
                  print('❌ Failed to download video')
                  sys.exit(1)

          elif M in ('playlist', 'channel'):
              print(f'\n📋 Extracting videos...')
              v, cn = gvl(U, MX)
              if not v: print('❌ No videos found'); sys.exit(1)

              cd = Path(f'downloads/{cn}_videos')
              cd.mkdir(parents=True, exist_ok=True)

              print(f'\n📝 Creating index...')
              mkidx(v, cn, cd)

              ok, fl = [], []
              print(f'\n📥 Downloading {len(v)} videos...\n{"="*50}')
              
              for i, x in enumerate(v, 1):
                  print(f'\n📥 [{i}/{len(v)}] {x["full_title"]}')
                  print(f'   Channel: {x["c"]} | Duration: {x["dr"]//60}m | Views: {x["v"]}')
                  
                  result = dl_video(x['u'])
                  if result:
                      # Use sanitized YouTube title as filename
                      filename = sanitize_filename(x['full_title'])
                      fp = cd / f'{filename}.{result["e"]}'
                      size = download_file(result['u'], fp)
                      if size:
                          print(f'   ✅ Downloaded ({size/1e6:.1f}MB) - Saved as: {filename}.{result["e"]}')
                          split_file(fp, SP)
                          ok.append(x['full_title'])
                      else:
                          print(f'   ❌ Download failed')
                          fl.append(x['full_title'])
                  else:
                      print(f'   ❌ Conversion failed')
                      fl.append(x['full_title'])
                  
                  if i < len(v): 
                      print(f'   ⏳ Waiting...')
                      time.sleep(2)

              Path('/tmp/meta.json').write_text(json.dumps({
                  'm': M, 'cd': str(cd), 'ok': len(ok), 'fl': len(fl), 'total': len(v)
              }))
              print(f'\n{"="*50}')
              print(f'📊 {len(ok)}/{len(v)} downloaded successfully')
              if fl: print(f'❌ Failed: {fl}')
              print(f'{"="*50}')

          else:
              # Single video mode (default)
              print(f'\n📹 Processing single video...')
              print(f'   URL: {U}')
              
              # Get video title
              video_title = get_youtube_title(U)
              
              if not video_title:
                  print('   ⚠️ Could not fetch video title, using video ID as fallback')
                  video_id = extract_video_id(U)
                  video_title = f"video_{video_id}" if video_id else "youtube_video"
              
              print(f'   📹 Video Title: {video_title}')
              
              # Get channel info
              channel_name = get_channel_from_url(U)
              if not channel_name:
                  channel_name = "youtube_downloads"
              
              result = dl_video(U)
              if result:
                  cd = Path(f'downloads/{channel_name}_videos')
                  cd.mkdir(parents=True, exist_ok=True)
                  
                  # Use sanitized YouTube title as filename
                  filename = sanitize_filename(video_title)
                  fp = cd / f'{filename}.{result["e"]}'
                  
                  print(f'   💾 Will save as: {filename}.{result["e"]}')
                  
                  size = download_file(result['u'], fp)
                  if size:
                      print(f'✅ Saved to {channel_name}_videos/ ({size/1e6:.1f}MB)')
                      print(f'   Filename: {filename}.{result["e"]}')
                      split_file(fp, SP)
                  else:
                      print('❌ Download failed')
              else:
                  print('❌ Failed'); sys.exit(1)
          
          PYEOF

      - name: 📤 Push Files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 PUSHING TO GITHUB"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          
          echo ""
          echo "📋 Adding all files..."
          git add -A
          
          TOTAL=$(git diff --cached --name-only | wc -l)
          echo "   Found $TOTAL files"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "❌ Nothing to push"
            exit 0
          fi
          
          git diff --cached --name-only | while read f; do
            echo "   📎 $f"
          done
          
          echo ""
          echo "📤 Pushing..."
          
          git commit -m "📦 $(date +%m%d-%H%M) [skip ci]" --quiet
          
          for i in 1 2 3 4 5; do
            echo -n "   🚀 Attempt $i/5..."
            if git pull --rebase --quiet 2>/dev/null && git push --quiet 2>/dev/null; then
              echo " ✅ DONE!"
              exit 0
            fi
            echo " ❌"
            git rebase --abort 2>/dev/null
            [ $i -lt 5 ] && sleep $((i*5))
          done
          
          echo "   ❌ Push failed"
          exit 1
